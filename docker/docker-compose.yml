# CamSim docker-compose
#
# Services:
#   sidecar — GStreamer MPEG-TS encoder + KLV muxer
#
# The Unreal Engine process runs on the host (or in a separate VM with GPU
# access); this compose file manages only the Python sidecar.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up
#   CAMSIM_HOST=192.168.1.100 CAMSIM_PORT=5004 docker compose up

services:
  sidecar:
    build:
      context: ..
      dockerfile: docker/Dockerfile.sidecar
    image: camsim-sidecar:latest

    # NVIDIA GPU runtime for nvh264enc
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    # Share host IPC namespace so POSIX shm regions are visible
    ipc: host

    # Host networking for multicast UDP
    network_mode: host

    environment:
      GST_DEBUG: "${GST_DEBUG:-2}"
      # Optional: override via env
      CAMSIM_HOST: "${CAMSIM_HOST:-239.1.1.1}"
      CAMSIM_PORT: "${CAMSIM_PORT:-5004}"
      CAMSIM_BITRATE: "${CAMSIM_BITRATE:-4000}"

    command:
      - "--host"
      - "${CAMSIM_HOST:-239.1.1.1}"
      - "--port"
      - "${CAMSIM_PORT:-5004}"
      - "--bitrate"
      - "${CAMSIM_BITRATE:-4000}"
      - "--log-level"
      - "${CAMSIM_LOG_LEVEL:-INFO}"

    restart: unless-stopped

    # Health check: verify sidecar process is running
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import os,time; s=os.stat('/tmp/camsim_heartbeat'); exit(0 if time.time()-s.st_mtime<30 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # --------------------------------------------------------------------------
  # flight-director: JSBSim flight dynamics → UDP SetFlightState to UE5
  # --------------------------------------------------------------------------
  flight-director:
    build:
      context: ..
      dockerfile: docker/Dockerfile.flightdir
    image: camsim-flightdir:latest

    # Needs localhost access to UE5 on host
    network_mode: host

    command:
      - "--host"
      - "${FLIGHTDIR_HOST:-127.0.0.1}"
      - "--port"
      - "${FLIGHTDIR_PORT:-5005}"
      - "--rate"
      - "${FLIGHTDIR_RATE:-30}"
      - "--speed"
      - "${FLIGHTDIR_SPEED:-100}"
      - "--heading"
      - "${FLIGHTDIR_HEADING:-0}"
      - "--alt-ft"
      - "${FLIGHTDIR_ALT_FT:-5000}"
      - "--bank-angle"
      - "${FLIGHTDIR_BANK:-25}"

    restart: unless-stopped

name: sidecar-tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install sidecar (dev)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "sidecar[dev]"
      - name: Run pytest
        run: |
          pytest -q sidecar/test_klv_encoder.py

